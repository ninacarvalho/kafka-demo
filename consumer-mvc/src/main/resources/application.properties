spring.application.name=kafka-mvc-consumer-demo

# Kafka broker address
spring.kafka.bootstrap-servers=localhost:9092

# Consumer identity
spring.kafka.consumer.group-id=mvc-consumer
spring.kafka.consumer.auto-offset-reset=earliest

# Deserialize both key and value as plain strings.
# We parse JSON manually in BatchKafkaListener using ObjectMapper.
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# BATCHING (size trigger): deliver up to 10 records per poll() call
# MVC equivalent of reactive's: .bufferTimeout(10, ...)
spring.kafka.consumer.max-poll-records=10

# BATCHING (time trigger): if fewer than 10 records are available, wait up to 2s for more
# MVC equivalent of reactive's: .bufferTimeout(..., Duration.ofSeconds(2))
spring.kafka.consumer.properties.fetch.max.wait.ms=2000

# Disable auto-commit — we commit manually via ack.acknowledge() after each batch
spring.kafka.consumer.enable-auto-commit=false

server.port=8081
management.endpoints.web.exposure.include=health,metrics

logging.level.com.demo=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n
