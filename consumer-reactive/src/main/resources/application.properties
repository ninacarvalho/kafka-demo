spring.application.name=kafka-reactive-consumer-demo

# Note: KafkaReceiver is configured manually in KafkaReceiverConfig.java
# (reactor-kafka does not use spring.kafka.* auto-configuration)

server.port=8082
management.endpoints.web.exposure.include=health,metrics

logging.level.com.demo=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n
